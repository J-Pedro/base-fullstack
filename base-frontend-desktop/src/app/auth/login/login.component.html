<div class="vh-100 d-flex justify-content-center align-items-center bg-custom">
  <form class="row g-3 p-4 rounded shadow login-container" style="max-width: 500px; width: 100%;">

    <h3 class="text-center w-100 mb-3">Login</h3>

    <!-- E-mail ocupa 12 colunas -->
    <div class="col-12">
      <label for="email" class="form-label">E-mail</label>
      <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail">
    </div>

    <!-- Senha ocupa 12 colunas -->
    <div class="col-12">
      <label for="password" class="form-label">Senha</label>
      <input type="password" id="password" class="form-control" placeholder="Digite sua senha">
    </div>

    <!-- Botão ocupa 12 colunas -->
    <div class="col-12 text-center">
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </div>

  </form>
</div>
